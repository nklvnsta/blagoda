services:
  db:
    image: postgres:16
    container_name: blagoda_db
    environment:
      POSTGRES_DB: blagoda_db
      POSTGRES_USER: blagoda_user
      POSTGRES_PASSWORD: blagoda_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    container_name: blagoda_backend
    command: sh -c "python manage.py migrate && python manage.py seed && python manage.py runserver 0.0.0.0:8000"
    env_file:
      - .env
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: blagoda_frontend
    command: sh -c " npm run dev -- --host 0.0.0.0 --port 3000"
    environment:
      VITE_API_BASE: https://blagoda-backend-nklvnsta.amera.io/api
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data: